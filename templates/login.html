<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Tô Careca de Saber</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; border: 1px solid #e5e5e5; padding: 32px; width: 360px; text-align: center; }
    .logo { font-size: 40px; margin-bottom: 8px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #555; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #555; text-align: left; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #d1d1d1; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    .btn { width: 100%; padding: 11px; background: #0071e3; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
    .btn:hover { background: #0058b0; }
    .erro { color: #c0392b; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍽️</div>
    <h1>Tô Careca de Saber</h1>
    <p class="sub">Painel do Dono / Gerente</p>
    {% if erro %}<p class="erro">{{ erro }}</p>{% endif %}
    <form method="POST">
      <label>Senha de acesso</label>
      <input type="password" name="senha" placeholder="••••••••" autofocus required>
      <button type="submit" class="btn">Entrar</button>
    </form>
  </div>
</body>
</html>
