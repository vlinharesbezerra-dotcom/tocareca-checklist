<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tô Careca de Saber{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
    .nav { background: white; border-bottom: 1px solid #e5e5e5; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { font-size: 16px; font-weight: 600; color: #1d1d1f; text-decoration: none; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-size: 14px; color: #555; text-decoration: none; }
    .nav-links a:hover { color: #1d1d1f; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
    .card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 20px; margin-bottom: 16px; }
    .btn { display: inline-block; padding: 9px 18px; border-radius: 8px; font-size: 14px; border: 1px solid #d1d1d1; background: white; color: #1d1d1f; cursor: pointer; text-decoration: none; font-family: inherit; }
    .btn:hover { background: #f5f5f7; }
    .btn-primary { background: #0071e3; color: white; border-color: #0071e3; }
    .btn-primary:hover { background: #0058b0; }
    .btn-danger { background: #ff3b30; color: white; border-color: #ff3b30; }
    .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .badge-ok { background: #d1f5e0; color: #1a7a3a; }
    .badge-warn { background: #fff3cd; color: #856404; }
    .badge-err { background: #fde8e8; color: #c0392b; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #d1d1d1; border-radius: 8px; font-size: 14px; font-family: inherit; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    h2 { font-size: 17px; font-weight: 600; margin-bottom: 12px; }
    .sub { font-size: 14px; color: #555; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 12px; color: #555; text-align: left; padding: 8px 12px; border-bottom: 1px solid #e5e5e5; }
    td { font-size: 14px; padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 600; }
    .stat-lbl { font-size: 13px; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  {% if session.get('logado') %}
  <nav class="nav">
    <a href="/painel" class="nav-brand">🍽️ Tô Careca de Saber</a>
    <div class="nav-links">
      <a href="/painel">Painel</a>
      <a href="/funcionarios">Funcionários</a>
      <a href="/logout">Sair</a>
    </div>
  </nav>
  {% endif %}
  <div class="container">{% block content %}{% endblock %}</div>
</body>
</html>
